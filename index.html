<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Multiplayer Vehicle Warfare</title>
    <style>
        body { margin: 0; }
        canvas { display: block; }
        #hud { position: absolute; top: 10px; left: 10px; color: white; }
        #minimap { position: absolute; bottom: 10px; right: 10px; width: 150px; height: 150px; background: rgba(0, 0, 0, 0.5); }
        #radar { position: absolute; bottom: 10px; left: 10px; width: 150px; height: 150px; background: rgba(0, 0, 0, 0.5); }
    </style>
</head>
<body>
    <canvas id="gameCanvas"></canvas>
    <div id="hud">Vehicle Health: <span id="health">100</span>%</div>
    <div id="minimap"></div>
    <div id="radar"></div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        // Example game setup
        let vehicles = [];
        let players = {};

        function Vehicle(x, y, type) {
            this.x = x;
            this.y = y;
            this.type = type;
            this.health = 100;
        }

        function initialize() {
            // Initialize vehicles and players
            vehicles.push(new Vehicle(100, 100, 'tank'));
            vehicles.push(new Vehicle(200, 200, 'ship'));
            vehicles.push(new Vehicle(300, 300, 'plane'));
            // More setup as needed
        }

        function update() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            vehicles.forEach(vehicle => {
                ctx.fillStyle = vehicle.type === 'tank' ? 'green' : vehicle.type === 'ship' ? 'blue' : 'gray';
                ctx.fillRect(vehicle.x, vehicle.y, 50, 30);
            });
            // Update health display
            document.getElementById('health').textContent = vehicles[0].health;
        }

        function loop() {
            update();
            requestAnimationFrame(loop);
        }

        window.onload = () => {
            initialize();
            loop();
        };
    </script>
</body>
</html>
